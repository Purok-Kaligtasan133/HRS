<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Change Password — Purok Kaligtasan</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --primary-green: #0f7a4a;
        --secondary-green: #34b78f;
        --accent-orange: #ff7a00;
        --light-green: #e9f7f2;
        --dark-green: #0a5c38;
        --light-gray: #f8faf9;
        --medium-gray: #e1e8e5;
        --text-dark: #1e2e28;
        --text-light: #6b6f6b;
        --white: #ffffff;
        --shadow: 0 10px 30px rgba(6, 30, 20, 0.1);
        --radius: 16px;
        --radius-sm: 8px;
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    body {
        min-height: 100vh;
        background: linear-gradient(135deg, var(--light-green) 0%, #f0f9f5 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .container {
        width: 100%;
        max-width: 400px;
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: fadeIn 0.5s ease-out;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .header {
        background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
        padding: 24px 20px;
        text-align: center;
        color: white;
    }
    
    .logo-circle {
        width: 80px;
        height: 80px;
        margin: 0 auto 12px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 3px solid rgba(255, 255, 255, 0.3);
    }
    
    .logo-circle img {
        width: 70px;
        height: 70px;
    }
    
    .header h1 {
        font-size: 1.4rem;
        margin-bottom: 4px;
    }
    
    .header p {
        font-size: 0.85rem;
        opacity: 0.9;
    }
    
    .content {
        padding: 28px 24px;
    }
    
    .warning-box {
        background: #fff8e1;
        border-left: 4px solid #ff9800;
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .warning-box i {
        font-size: 1.5rem;
        color: #ff9800;
    }
    
    .warning-box p {
        color: #856404;
        font-size: 0.85rem;
        margin: 0;
        line-height: 1.4;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-dark);
        font-weight: 500;
        font-size: 0.9rem;
    }
    
    .input-with-icon {
        position: relative;
    }
    
    .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-light);
        font-size: 1rem;
    }
    
    .form-input {
        width: 100%;
        padding: 14px 40px 14px 42px;
        border: 2px solid var(--medium-gray);
        border-radius: var(--radius-sm);
        font-size: 16px;
        color: var(--text-dark);
        transition: all 0.3s ease;
    }
    
    .form-input:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 3px rgba(15, 122, 74, 0.1);
    }
    
    .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-light);
        cursor: pointer;
        font-size: 1rem;
        padding: 6px;
    }
    
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
        color: white;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(15, 122, 74, 0.25);
    }
    
    .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }
    
    .error-message {
        background: rgba(239, 68, 68, 0.1);
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
        color: #dc2626;
        font-size: 0.85rem;
        display: none;
    }
    
    .success-message {
        background: rgba(15, 122, 74, 0.1);
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
        color: var(--primary-green);
        font-size: 0.85rem;
        display: none;
    }
    
    .password-strength {
        margin-top: 8px;
        font-size: 0.75rem;
    }
    
    .strength-weak { color: #dc2626; }
    .strength-medium { color: #ff9800; }
    .strength-strong { color: #0f7a4a; }
    
    @media (max-width: 480px) {
        .container {
            margin: 0 15px;
        }
        .content {
            padding: 24px 16px;
        }
        .form-input {
            font-size: 16px;
        }
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-circle">
            <img src="assets/MDRRMO Logo.png" alt="MDRRMO Logo">
        </div>
        <h1>Change Password Required</h1>
        <p>Please set a new password to continue</p>
    </div>
    
    <div class="content">
        <div class="warning-box">
            <i class="fas fa-exclamation-triangle"></i>
            <p>You are using a temporary password. For security reasons, you must change your password before continuing.</p>
        </div>
        
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>
        
        <div class="form-group">
            <label class="form-label">Current / Temporary Password</label>
            <div class="input-with-icon">
                <i class="input-icon fas fa-lock"></i>
                <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password">
                <button type="button" class="password-toggle" id="toggleCurrentPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="input-with-icon">
                <i class="input-icon fas fa-key"></i>
                <input type="password" id="newPassword" class="form-input" placeholder="Enter new password">
                <button type="button" class="password-toggle" id="toggleNewPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <div id="passwordStrength" class="password-strength"></div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <div class="input-with-icon">
                <i class="input-icon fas fa-check-circle"></i>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password">
                <button type="button" class="password-toggle" id="toggleConfirmPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <button id="changePasswordBtn" class="btn">
            <i class="fas fa-save"></i> Change Password & Continue
        </button>
        
        <div style="margin-top: 20px; text-align: center;">
            <a href="index.html" style="color: var(--text-light); font-size: 0.8rem; text-decoration: none;">
                <i class="fas fa-sign-out-alt"></i> Logout and return to login
            </a>
        </div>
    </div>
</div>

<script>
// ============================================
// SUPABASE CONFIGURATION (NO DUPLICATE DECLARATION)
// ============================================
const SUPABASE_URL = 'https://opibntxwagnjazpbtxrv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_UwyTZU3BYj41z0D7beu9Hg_pIZcLeWN';

// Use a different variable name to avoid conflict
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================
// PASSWORD VISIBILITY TOGGLE FUNCTIONS
// ============================================
function setupPasswordToggle(inputId, toggleId) {
    const input = document.getElementById(inputId);
    const toggle = document.getElementById(toggleId);
    
    if (input && toggle) {
        toggle.addEventListener('click', function() {
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            const icon = this.querySelector('i');
            if (type === 'text') {
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    }
}

// ============================================
// CHECK USER SESSION
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    const mustChange = sessionStorage.getItem('mustChangePassword');
    const username = sessionStorage.getItem('tempUsername');
    
    if (!mustChange || mustChange !== 'true' || !username) {
        window.location.href = 'index.html';
        return;
    }
    
    // Setup password toggles
    setupPasswordToggle('currentPassword', 'toggleCurrentPassword');
    setupPasswordToggle('newPassword', 'toggleNewPassword');
    setupPasswordToggle('confirmPassword', 'toggleConfirmPassword');
    
    // Setup password strength checker
    const newPasswordInput = document.getElementById('newPassword');
    if (newPasswordInput) {
        newPasswordInput.addEventListener('input', checkPasswordStrength);
    }
});

// ============================================
// PASSWORD STRENGTH CHECKER
// ============================================
function checkPasswordStrength() {
    const password = this.value;
    const strengthDiv = document.getElementById('passwordStrength');
    
    if (password.length === 0) {
        if (strengthDiv) strengthDiv.innerHTML = '';
        return;
    }
    
    let strength = 0;
    let message = '';
    let className = '';
    
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]+/)) strength++;
    if (password.match(/[A-Z]+/)) strength++;
    if (password.match(/[0-9]+/)) strength++;
    if (password.match(/[$@#&!]+/)) strength++;
    
    if (strength <= 2) {
        message = 'Weak password';
        className = 'strength-weak';
    } else if (strength <= 4) {
        message = 'Medium password';
        className = 'strength-medium';
    } else {
        message = 'Strong password';
        className = 'strength-strong';
    }
    
    if (strengthDiv) {
        strengthDiv.innerHTML = `<i class="fas fa-shield-alt"></i> ${message}`;
        strengthDiv.className = `password-strength ${className}`;
    }
}

// ============================================
// SHA-256 HASH FUNCTION
// ============================================
async function sha256Hash(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================
// CHANGE PASSWORD HANDLER
// ============================================
document.getElementById('changePasswordBtn')?.addEventListener('click', async function() {
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    const btn = this;
    
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    // Validation
    if (!currentPassword) {
        errorDiv.textContent = 'Please enter your current password';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (!newPassword) {
        errorDiv.textContent = 'Please enter a new password';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (newPassword.length < 6) {
        errorDiv.textContent = 'New password must be at least 6 characters long';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (newPassword !== confirmPassword) {
        errorDiv.textContent = 'New passwords do not match';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (currentPassword === newPassword) {
        errorDiv.textContent = 'New password must be different from the current password';
        errorDiv.style.display = 'block';
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Changing password...';
    
    try {
        const username = sessionStorage.getItem('tempUsername');
        
        if (!username) {
            throw new Error('Session expired. Please login again.');
        }
        
        if (!supabaseClient) {
            throw new Error('Database connection failed. Please refresh the page.');
        }
        
        // Hash the passwords
        const currentPasswordHash = await sha256Hash(currentPassword);
        const newPasswordHash = await sha256Hash(newPassword);
        
        // First, verify current password is correct
        const { data: user, error: userError } = await supabaseClient
            .from('users')
            .select('username, password_hash, full_name, role, assigned_barangay')
            .eq('username', username)
            .single();
        
        if (userError || !user) {
            throw new Error('User not found');
        }
        
        if (user.password_hash !== currentPasswordHash) {
            errorDiv.textContent = 'Current password is incorrect';
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Change Password & Continue';
            return;
        }
        
        // Update password in Supabase
        const { error: updateError } = await supabaseClient
            .from('users')
            .update({ 
                password_hash: newPasswordHash,
                must_change_password: false
            })
            .eq('username', username);
        
        if (updateError) throw updateError;
        
        // Log the password change
        await supabaseClient.from('audit_logs').insert([{
            action: 'Password Changed',
            actor: username,
            details: `${user.full_name || username} changed password`
        }]);
        
        // Clear temporary session data
        sessionStorage.removeItem('mustChangePassword');
        sessionStorage.removeItem('tempUsername');
        
        // Store the user session
        localStorage.setItem('loggedIn', 'true');
        localStorage.setItem('isGuest', 'false');
        localStorage.setItem('username', user.username);
        localStorage.setItem('staffName', user.full_name || user.username);
        localStorage.setItem('userRole', user.role);
        localStorage.setItem('assignedBarangay', user.assigned_barangay || '');
        localStorage.setItem('sessionId', crypto.randomUUID ? crypto.randomUUID() : Date.now().toString());
        localStorage.setItem('loginTime', Date.now().toString());
        
        // Show success
        successDiv.textContent = 'Password changed successfully! Redirecting...';
        successDiv.style.display = 'block';
        
        // Redirect to MAIN.HTML
        setTimeout(() => {
            window.location.replace("main.html");
        }, 2000);
        
    } catch (error) {
        console.error('Change password error:', error);
        errorDiv.textContent = 'Error: ' + error.message;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Change Password & Continue';
    }
});

// Allow Enter key to submit
document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('changePasswordBtn').click();
        }
    });
});
</script>
</body>
</html>
