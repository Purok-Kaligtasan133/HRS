<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #0f7a4a;
            --secondary-green: #34b78f;
            --accent-orange: #ff7a00;
            --light-green: #e9f7f2;
            --dark-green: #0a5c38;
            --light-gray: #f8faf9;
            --medium-gray: #e1e8e5;
            --text-dark: #1e2e28;
            --text-light: #6b6f6b;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(6, 30, 20, 0.1);
            --radius: 16px;
            --radius-sm: 8px;
        }
        .guest-login-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .guest-login-btn:hover {
            background: var(--light-green);
            transform: translateY(-2px);
        }
        .guest-login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--light-green) 0%, #f0f9f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(15, 122, 74, 0.05);
        }
        .circle-1 { width: 200px; height: 200px; top: -100px; right: -100px; }
        .circle-2 { width: 150px; height: 150px; bottom: -75px; left: -75px; background: rgba(255, 122, 0, 0.05); }
        .circle-3 { width: 100px; height: 100px; top: 50%; left: 10%; background: rgba(52, 183, 143, 0.05); }
        .login-container {
            width: 100%;
            max-width: 380px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            padding: 24px 20px;
            text-align: center;
            color: white;
            position: relative;
        }
        .logo-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        .logo-circle img { width: 90px; height: 90px; }
        .header-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .header-subtitle { font-size: 0.9rem; opacity: 0.9; }
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent-orange);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .login-form-container { padding: 20px 24px; }
        .form-title { color: var(--text-dark); font-size: 1.3rem; margin-bottom: 6px; }
        .form-subtitle { color: var(--text-light); font-size: 0.85rem; margin-bottom: 9px; }
        .form-group { margin-bottom: 16px; position: relative; }
        .form-label { display: block; margin-bottom: 6px; color: var(--text-dark); font-weight: 500; font-size: 0.9rem; }
        .input-with-icon { position: relative; display: block; width: 100%; }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1rem;
            z-index: 1;
        }
        .form-input {
            width: 100%;
            padding: 14px 40px 14px 42px;
            border: 2px solid var(--medium-gray);
            border-radius: var(--radius-sm);
            font-size: 16px;
            color: var(--text-dark);
            background: var(--white);
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(15, 122, 74, 0.1);
        }
        #loginError {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            color: #dc2626;
            font-size: 0.85rem;
        }
        #statusText {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 16px;
            padding: 5px 8px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15, 122, 74, 0.25); }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .login-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--medium-gray);
            text-align: center;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        .footer-note { margin-top: 6px; font-size: 0.75rem; opacity: 0.8; }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1rem;
            padding: 6px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        /* Rate limit indicator */
        .rate-limit-warning {
            display: none;
            background: rgba(255, 122, 0, 0.1);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: var(--accent-orange);
            text-align: center;
        }
        @media (max-width: 480px) {
            .login-container { max-width: 100%; margin: 0 15px; }
            .circle-1, .circle-2, .circle-3 { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern">
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <div class="badge">SECURE LOGIN</div>
            <div class="logo-container">
                <div class="logo-circle">
                    <img src="assets/MDRRMO Logo.png" alt="MDRRMO Logo">
                </div>
                <h1 class="header-title">PUROK KALIGTASAN 133</h1>
                <p class="header-subtitle">MDRRMO Alitagtag – Household Records System</p>
            </div>
        </div>

        <div class="login-form-container">
            <h2 class="form-title">Welcome Back</h2>
            <p class="form-subtitle">Please enter your credentials to access the system</p>

            <div id="rateLimitWarning" class="rate-limit-warning">
                <i class="fas fa-clock"></i> Too many attempts. Please wait...
            </div>
            <div id="loginError" style="display:none;"></div>
            <p id="statusText"></p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-with-icon">
                        <i class="input-icon fas fa-user"></i>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-with-icon">
                        <i class="input-icon fas fa-lock"></i>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginButton">
                    <i class="fas fa-sign-in-alt"></i>
                    <span class="btn-text">Login to System</span>
                </button>
                
                <div style="margin-top: 15px; text-align: center;">
                    <button type="button" id="guestLoginBtn" class="guest-login-btn">
                        <i class="fas fa-user-guest"></i>
                        <span>Continue as Guest</span>
                    </button>
                    <p style="margin-top: 8px; font-size: 0.75rem; color: var(--text-light);">
                        Guest users have view-only access
                    </p>
                </div>
            </form>

            <div class="login-footer">
                <p><i class="fas fa-shield-alt"></i> Authorized Personnel Only</p>
                <p class="footer-note">Unauthorized access is strictly prohibited</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ============================================
            // CONCURRENCY PROTECTION VARIABLES
            // ============================================
            const SUPABASE_URL = 'https://opibntxwagnjazpbtxrv.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_UwyTZU3BYj41z0D7beu9Hg_pIZcLeWN';
            
            // Rate limiting
            const loginAttempts = new Map(); // IP-based rate limiting
            const MAX_ATTEMPTS = 5;
            const RATE_LIMIT_WINDOW = 15 * 60 * 1000; // 15 minutes
            const COOLDOWN_PERIOD = 60 * 1000; // 1 minute cooldown after rate limit
            
            // Login queue for concurrent requests
            let isProcessingLogin = false;
            let loginQueue = [];
            
            let supabase = null;
            
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        autoRefreshToken: true,
                        persistSession: true,
                        detectSessionInUrl: false
                    },
                    db: {
                        schema: 'public'
                    }
                });
                console.log('✅ Supabase client created successfully');
            } catch (err) {
                console.error('❌ Failed to create Supabase client:', err);
            }
            
            // ============================================
            // RATE LIMITING FUNCTIONS
            // ============================================
            function getClientIdentifier() {
                // Use a combination of localStorage key + timestamp to identify
                let clientId = localStorage.getItem('clientId');
                if (!clientId) {
                    clientId = 'client_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('clientId', clientId);
                }
                return clientId;
            }
            
            function checkRateLimit() {
                const clientId = getClientIdentifier();
                const now = Date.now();
                const attempts = loginAttempts.get(clientId);
                
                if (!attempts) {
                    return { allowed: true, remaining: MAX_ATTEMPTS, waitTime: 0 };
                }
                
                // Clean up old attempts
                const recentAttempts = attempts.filter(time => now - time < RATE_LIMIT_WINDOW);
                
                if (recentAttempts.length >= MAX_ATTEMPTS) {
                    const oldestAttempt = Math.min(...recentAttempts);
                    const waitTime = (oldestAttempt + RATE_LIMIT_WINDOW) - now;
                    return { allowed: false, remaining: 0, waitTime: Math.ceil(waitTime / 1000) };
                }
                
                return { allowed: true, remaining: MAX_ATTEMPTS - recentAttempts.length, waitTime: 0 };
            }
            
            function recordLoginAttempt() {
                const clientId = getClientIdentifier();
                const now = Date.now();
                const attempts = loginAttempts.get(clientId) || [];
                attempts.push(now);
                
                // Keep only last hour of attempts
                const recentAttempts = attempts.filter(time => now - time < RATE_LIMIT_WINDOW);
                loginAttempts.set(clientId, recentAttempts);
            }
            
            // ============================================
            // LOGIN QUEUE SYSTEM
            // ============================================
            async function queueLoginRequest(loginFunction, args) {
                return new Promise((resolve, reject) => {
                    loginQueue.push({ resolve, reject, loginFunction, args });
                    processLoginQueue();
                });
            }
            
            async function processLoginQueue() {
                if (isProcessingLogin || loginQueue.length === 0) return;
                
                isProcessingLogin = true;
                const request = loginQueue.shift();
                
                try {
                    const result = await request.loginFunction(...request.args);
                    request.resolve(result);
                } catch (error) {
                    request.reject(error);
                } finally {
                    isProcessingLogin = false;
                    // Process next in queue after a short delay
                    setTimeout(() => processLoginQueue(), 100);
                }
            }
            
            // ============================================
            // CACHED USER QUERY (reduces database load)
            // ============================================
            const userCache = new Map();
            const CACHE_TTL = 5 * 60 * 1000; // 5 minutes
            
            async function getUserFromCache(username) {
                const cached = userCache.get(username);
                if (cached && (Date.now() - cached.timestamp) < CACHE_TTL) {
                    console.log('✅ Returning cached user:', username);
                    return cached.data;
                }
                return null;
            }
            
            function cacheUser(username, userData) {
                userCache.set(username, {
                    data: userData,
                    timestamp: Date.now()
                });
                // Clean old cache entries periodically
                if (userCache.size > 100) {
                    for (const [key, value] of userCache.entries()) {
                        if (Date.now() - value.timestamp > CACHE_TTL) {
                            userCache.delete(key);
                        }
                    }
                }
            }
            
            // ============================================
            // HELPER FUNCTIONS
            // ============================================
            async function sha256Hash(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }
            
            // Debounced hash function to prevent blocking
            const hashCache = new Map();
            async function hashPasswordWithCache(password) {
                if (hashCache.has(password)) {
                    return hashCache.get(password);
                }
                const hash = await sha256Hash(password);
                if (hashCache.size < 100) {
                    hashCache.set(password, hash);
                }
                return hash;
            }
            
            function showError(message) {
                const errorDiv = document.getElementById('loginError');
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    if (errorDiv) errorDiv.style.display = 'none';
                }, 5000);
            }
            
            function showStatus(message, isError = false) {
                const statusDiv = document.getElementById('statusText');
                if (statusDiv) {
                    statusDiv.textContent = message;
                    statusDiv.style.color = isError ? '#dc2626' : '#0f7a4a';
                    setTimeout(() => {
                        if (statusDiv) statusDiv.textContent = '';
                    }, 3000);
                }
            }
            
            function showRateLimitWarning(waitSeconds) {
                const warningDiv = document.getElementById('rateLimitWarning');
                if (warningDiv) {
                    warningDiv.style.display = 'block';
                    warningDiv.innerHTML = `<i class="fas fa-clock"></i> Too many login attempts. Please wait ${waitSeconds} seconds.`;
                    setTimeout(() => {
                        if (warningDiv) warningDiv.style.display = 'none';
                    }, 5000);
                }
            }
            
            // ============================================
            // MAIN LOGIN FUNCTION (OPTIMIZED FOR CONCURRENCY)
            // ============================================
            async function performLogin(username, password) {
                if (!supabase) {
                    throw new Error('Database connection error. Please refresh the page.');
                }
                
                // Check rate limit
                const rateLimit = checkRateLimit();
                if (!rateLimit.allowed) {
                    showRateLimitWarning(rateLimit.waitTime);
                    throw new Error(`Rate limit exceeded. Please wait ${rateLimit.waitTime} seconds.`);
                }
                
                // Query user from cache or database
                let user = await getUserFromCache(username);
                
                if (!user) {
                    console.log('Fetching user from database:', username);
                    
                    // Use a timeout to prevent hanging
                    const timeoutPromise = new Promise((_, reject) => {
                        setTimeout(() => reject(new Error('Database query timeout')), 10000);
                    });
                    
                    const queryPromise = supabase
                        .from('users')
                        .select('username, password_hash, full_name, role, assigned_barangay, is_active, email')
                        .eq('username', username)
                        .limit(1);
                    
                    const { data: users, error: userError } = await Promise.race([queryPromise, timeoutPromise]);
                    
                    if (userError) {
                        console.error('Database error:', userError);
                        throw new Error('Database error: ' + userError.message);
                    }
                    
                    if (!users || users.length === 0) {
                        recordLoginAttempt();
                        throw new Error('Invalid username or password');
                    }
                    
                    user = users[0];
                    cacheUser(username, user);
                }
                
                if (!user.is_active) {
                    recordLoginAttempt();
                    throw new Error('Your account is deactivated. Please contact administrator.');
                }
                
                // Verify password with cached hash
                const passwordHash = await hashPasswordWithCache(password);
                if (user.password_hash !== passwordHash) {
                    recordLoginAttempt();
                    throw new Error('Invalid username or password');
                }
                
                console.log('✅ Password verified for:', username);
                return user;
            }
            
            async function handleAuthSetup(user, password) {
                const userEmail = user.email || `${user.username}@purokkaligtasan.local`;
                console.log('Setting up Supabase Auth for:', userEmail);
                
                let authSuccess = false;
                
                try {
                    // Check if already have valid session
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session && session.user.email === userEmail) {
                        console.log('✅ Already have valid session');
                        localStorage.setItem('supabase_session', JSON.stringify(session));
                        return true;
                    }
                    
                    // Try to sign in
                    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                        email: userEmail,
                        password: password
                    });
                    
                    if (!authError && authData.session) {
                        console.log('✅ Supabase Auth login successful');
                        localStorage.setItem('supabase_session', JSON.stringify(authData.session));
                        return true;
                    }
                    
                    // Try to create user
                    if (authError && authError.message.includes('Invalid login')) {
                        console.log('Attempting to create Auth user...');
                        const { error: signUpError } = await supabase.auth.signUp({
                            email: userEmail,
                            password: password,
                            options: {
                                data: {
                                    username: user.username,
                                    full_name: user.full_name,
                                    role: user.role
                                }
                            }
                        });
                        
                        if (!signUpError) {
                            // Try login again
                            const { data: retryData } = await supabase.auth.signInWithPassword({
                                email: userEmail,
                                password: password
                            });
                            if (retryData?.session) {
                                localStorage.setItem('supabase_session', JSON.stringify(retryData.session));
                                return true;
                            }
                        }
                    }
                } catch (authErr) {
                    console.error('Auth operation error:', authErr);
                }
                
                console.log('⚠️ Auth setup incomplete, but continuing with local session');
                return false;
            }
            
            // ============================================
            // WRAPPED LOGIN WITH QUEUE
            // ============================================
            async function handleLogin(event) {
                event.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginButton');
                const errorDiv = document.getElementById('loginError');
                
                if (!username || !password) {
                    showError('Please enter username and password');
                    return;
                }
                
                // Disable button to prevent double submission
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                if (errorDiv) errorDiv.style.display = 'none';
                
                try {
                    // Queue the login request to handle concurrency
                    const user = await queueLoginRequest(performLogin, [username, password]);
                    
                    // Setup Auth (non-critical, can be async)
                    handleAuthSetup(user, password).catch(err => {
                        console.warn('Auth setup warning:', err);
                    });
                    
                    // Store session
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('isGuest', 'false');
                    localStorage.setItem('username', user.username);
                    localStorage.setItem('staffName', user.full_name || user.username);
                    localStorage.setItem('userRole', user.role);
                    localStorage.setItem('assignedBarangay', user.assigned_barangay || '');
                    localStorage.setItem('sessionId', 'session_' + Date.now());
                    localStorage.setItem('loginTime', Date.now().toString());
                    localStorage.setItem('userEmail', user.email || `${user.username}@purokkaligtasan.local`);
                    localStorage.setItem('userPassword', password);
                    
                    // Log audit (fire and forget - don't await)
                    try {
                        supabase.from('audit_logs').insert([{
                            action: 'User Login',
                            actor: user.username,
                            details: (user.full_name || user.username) + ' logged in successfully'
                        }]).then(() => console.log('✅ Audit logged')).catch(() => {});
                    } catch (auditErr) {
                        console.log('Audit log error (non-critical):', auditErr.message);
                    }
                    
                    showStatus('Login successful! Redirecting to dashboard...');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                    
                } catch (err) {
                    console.error('Login error:', err);
                    showError(err.message || 'Login failed. Please try again.');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to System';
                }
            }
            
            // Guest login (no rate limiting for guest)
            async function guestLogin() {
                const guestBtn = document.getElementById('guestLoginBtn');
                guestBtn.disabled = true;
                guestBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('isGuest', 'true');
                localStorage.setItem('username', 'guest');
                localStorage.setItem('staffName', 'Guest User');
                localStorage.setItem('userRole', 'Guest');
                localStorage.setItem('assignedBarangay', '');
                localStorage.setItem('sessionId', 'guest_' + Date.now());
                localStorage.setItem('loginTime', Date.now().toString());
                
                showStatus('Guest access granted. Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            }
            
            // ============================================
            // SESSION CHECK
            // ============================================
            async function checkExistingSession() {
                const loggedIn = localStorage.getItem('loggedIn') === 'true';
                const loginTime = localStorage.getItem('loginTime');
                const isGuest = localStorage.getItem('isGuest') === 'true';
                
                if (isGuest && loggedIn) {
                    window.location.href = 'dashboard.html';
                    return true;
                }
                
                if (loggedIn && loginTime) {
                    const sessionAge = Date.now() - parseInt(loginTime);
                    const SESSION_TIMEOUT = 8 * 60 * 60 * 1000; // 8 hours
                    
                    if (sessionAge < SESSION_TIMEOUT) {
                        const userRole = localStorage.getItem('userRole');
                        if (userRole && userRole !== 'null' && userRole !== 'undefined') {
                            console.log("Already logged in, redirecting to dashboard...");
                            window.location.href = 'dashboard.html';
                            return true;
                        }
                    }
                }
                
                // Clear stale sessions
                localStorage.removeItem('loggedIn');
                localStorage.removeItem('isGuest');
                return false;
            }
            
            // ============================================
            // INITIALIZATION
            // ============================================
            checkExistingSession().then(redirected => {
                if (redirected) return;
                
                // Password visibility toggle
                const toggleBtn = document.getElementById('togglePassword');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', function() {
                        const passwordField = document.getElementById('password');
                        const icon = this.querySelector('i');
                        if (passwordField.type === 'password') {
                            passwordField.type = 'text';
                            icon.classList.remove('fa-eye');
                            icon.classList.add('fa-eye-slash');
                        } else {
                            passwordField.type = 'password';
                            icon.classList.remove('fa-eye-slash');
                            icon.classList.add('fa-eye');
                        }
                    });
                }
                
                // Set up event listeners
                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', handleLogin);
                }
                
                const guestBtn = document.getElementById('guestLoginBtn');
                if (guestBtn) {
                    guestBtn.addEventListener('click', guestLogin);
                }
                
                // Enter key support
                const passwordField = document.getElementById('password');
                if (passwordField) {
                    passwordField.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            if (loginForm) {
                                loginForm.dispatchEvent(new Event('submit'));
                            }
                        }
                    });
                }
                
                console.log('✅ Login page ready - Concurrency protection active');
                console.log('📊 Max concurrent logins: Unlimited (queued)');
                console.log('⏱️ Rate limit:', MAX_ATTEMPTS, 'attempts per', RATE_LIMIT_WINDOW / 60000, 'minutes');
            });
        });
    </script>
</body>
